{% extends 'news/base.html' %}
{% load static %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container mt-5 pt-3">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="section-title mb-0">
                <h4 class="m-0 text-uppercase font-weight-bold">Login</h4>
            </div>
            <div class="bg-white border border-top-0 p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary font-weight-semi-bold px-4 w-100" style="height: 50px;">Login</button>
                </form>
                <hr>
                <p class="text-center mb-2">Forgot your password? <a href="{% url 'password_reset' %}" class="font-weight-bold">Reset it here</a></p>
                <p class="text-center mb-0">Don't have an account? <a href="{% url 'register' %}" class="font-weight-bold">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
