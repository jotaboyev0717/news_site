{% extends "news/base.html" %}
{% load static %}
{% block title %}User Registration{% endblock %}

{% block content %}
<div class="container mt-5 pt-3">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="section-title mb-0">
                <h4 class="m-0 text-uppercase font-weight-bold">Register</h4>
            </div>
            <div class="bg-white border border-top-0 p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ user_form.as_p }}
                    <button type="submit" class="btn btn-primary font-weight-semi-bold px-4 w-100" style="height: 50px;">Register</button>
                </form>
                <hr>
                <p class="text-center mb-0">Already have an account? <a href="{% url 'login' %}" class="font-weight-bold">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
