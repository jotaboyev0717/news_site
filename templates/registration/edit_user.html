{% extends "news/base.html" %}

{% block title %}
    Edit Profile
{% endblock %}

{% block content %}
    <h2>Edit your profile</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ user_form.as_p }}
        {{ profile_form.as_p }}
        <button type="submit" class="btn btn-primary">Save changes</button>
    </form>
{% endblock %}
